services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tyotrack-db
    restart: always
    environment:
      POSTGRES_DB: tyotrack
      POSTGRES_USER: tyotrack
      POSTGRES_PASSWORD: tyotrack_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tyotrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for future realtime/caching)
  redis:
    image: redis:7-alpine
    container_name: tyotrack-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tyotrack-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://tyotrack:tyotrack_password@postgres:5432/tyotrack?schema=public
      - AUTH_SECRET=8E0jAdY3y1xZ2X7mKbqXbaPLuEFLwfuGlbVIVpPuNZY=
      - NEXTAUTH_URL=http://localhost:3000
      - AUTH_TRUST_HOST=true
      - NODE_ENV=production
      - TZ=Asia/Colombo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
