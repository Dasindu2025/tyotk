services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tyotrack-db
    environment:
      POSTGRES_DB: tyotrack
      POSTGRES_USER: tyotrack
      POSTGRES_PASSWORD: tyotrack_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tyotrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for future realtime/caching)
  redis:
    image: redis:7-alpine
    container_name: tyotrack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
